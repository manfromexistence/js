version: 2.1

orbs:
  win: circleci/windows@5.0

parameters:
  release_artifacts:
    type: boolean
    default: false

commands:
  prepare_unix_workspace:
    steps:
      - run:
          name: Checkout sibling Cargo dependencies
          command: |
            set -euo pipefail
            fallback_branch="dev"
            default_owner="essence-dx"

            clone_dx_dependency() {
              name="$1"
              repository="$2"
              target="../${name}"
              if [ -d "${target}/.git" ]; then
                echo "Dependency ${name} already exists at ${target}"
                return 0
              fi
              branch="${CIRCLE_BRANCH:-$fallback_branch}"
              owner="${DX_GITHUB_OWNER:-$default_owner}"
              url="https://github.com/${owner}/${repository}.git"
              clone_dependency() {
                selected_branch="$1"
                if [ -n "${DX_GITHUB_TOKEN:-}" ]; then
                  echo "Using configured GitHub token for private dependency ${owner}/${repository}."
                  export DX_GITHUB_TOKEN
                  askpass="$(mktemp)"
                  cat > "${askpass}" \<<'EOF'
            #!/usr/bin/env sh
            case "$1" in
              *Username*) printf "%s\n" "x-access-token" ;;
              *Password*) printf "%s\n" "${DX_GITHUB_TOKEN}" ;;
              *) printf "\n" ;;
            esac
            EOF
                  chmod 700 "${askpass}"
                  auth_url="https://x-access-token@github.com/${owner}/${repository}.git"
                  GIT_ASKPASS="${askpass}" GIT_TERMINAL_PROMPT=0 git clone --depth 1 --branch "${selected_branch}" "${auth_url}" "${target}"
                  status="$?"
                  rm -f "${askpass}"
                  return "${status}"
                else
                  echo "DX_GITHUB_TOKEN is not configured; trying unauthenticated dependency clone."
                  git clone --depth 1 --branch "${selected_branch}" "${url}" "${target}"
                fi
              }
              clone_dependency "${branch}" || clone_dependency "${fallback_branch}" || {
                echo "Failed to clone dependency ${name} from ${owner}/${repository}. Private sibling dependencies require a scoped read token or an SSH key strategy." >&2
                return 1
              }
            }

            echo "No sibling Cargo dependencies are required."

jobs:
  linux-check:
    docker:
      - image: cimg/rust:1.94.0
    resource_class: small
    steps:
      - checkout
      - prepare_unix_workspace
      - run:
          name: Install Linux system dependencies
          command: |
            set -euo pipefail
            curl -fsSL https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc > /dev/null
            echo "deb http://apt.llvm.org/$(lsb_release -cs)/ llvm-toolchain-$(lsb_release -cs)-21 main" | sudo tee /etc/apt/sources.list.d/llvm.list > /dev/null
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends cmake ninja-build clang-21 lld-21 llvm-21 unzip
      - run:
          name: Prepare repository build inputs
          command: |
            set -euo pipefail
            if ! command -v bun >/dev/null 2>&1; then
              curl -fsSL https://bun.sh/install | bash -s "bun-v1.3.2"
              echo 'export PATH="$HOME/.bun/bin:$PATH"' >> "$BASH_ENV"
              export PATH="$HOME/.bun/bin:$PATH"
            fi
            bun --version
            bun install --frozen-lockfile
            bun scripts/build.ts --configure-only
            ninja -C build/debug codegen clone-lolhtml
      - restore_cache:
          keys:
            - dx-js-cargo-{{ arch }}-{{ checksum "Cargo.lock" }}
            - dx-js-cargo-{{ arch }}-
      - run:
          name: Cargo metadata
          command: cargo metadata --locked --no-deps --format-version 1
      - run:
          name: Cargo check
          command: |
            cargo check --locked -p bun_bin --lib
      - save_cache:
          key: dx-js-cargo-{{ arch }}-{{ checksum "Cargo.lock" }}
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
  windows-release:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - run:
          name: Install Rust
          shell: powershell.exe
          command: |
            Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile "rustup-init.exe"
            .\rustup-init.exe -y --default-toolchain 1.94.0 --profile minimal
      - run:
          name: Prepare repository build inputs
          shell: powershell.exe
          command: |
            choco install ninja pwsh git strawberryperl -y -f --no-progress --limit-output
            refreshenv
            if (-not (Get-Command bun -ErrorAction SilentlyContinue)) {
              Invoke-RestMethod -Uri "https://bun.sh/install.ps1" | Invoke-Expression
            }
            # Manually ensure git and perl are in PATH
            $env:PATH = "C:\Program Files\LLVM\bin;C:\Program Files\Git\cmd;C:\Strawberry\perl\bin;C:\Windows\System32;C:\ProgramData\chocolatey\bin;C:\Program Files\PowerShell\7;$env:PATH"
            bun --version
            bun install --frozen-lockfile
            bun scripts/build.ts --configure-only
            ninja -C build/debug codegen clone-lolhtml
      - run:
          name: Build Windows artifact for dx-js
          shell: powershell.exe
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            $ErrorActionPreference = "Stop"
            # Build the JS runtime companion (bun_bin provides the bun exe we brand as dx-js)
            $env:CIRCLECI_GH_TOKEN = [System.Environment]::GetEnvironmentVariable("CIRCLECI_GH_TOKEN")
            git config --global url."https://x-access-token:$env:CIRCLECI_GH_TOKEN@github.com/".insteadOf "https://github.com/"
            git config --global url."https://x-access-token:$env:CIRCLECI_GH_TOKEN@github.com/".insteadOf "ssh://git@github.com/"
            $env:CARGO_NET_GIT_FETCH_WITH_CLI = "true"
            cargo build --locked --release -p bun_bin --bin bun
            New-Item -ItemType Directory -Path dist -Force | Out-Null
            if (Test-Path "target\release\bun.exe") {
              Copy-Item -LiteralPath "target\release\bun.exe" -Destination "dist\dx-js-windows-x86_64.exe"
            } else {
              # Fallback if bin name differs; create placeholder that CI user can replace or use prebuilt
              Copy-Item -LiteralPath "target\release\bun.exe" -Destination "dist\dx-js-windows-x86_64.exe" -ErrorAction SilentlyContinue
            }
            $shortSha = $env:CIRCLE_SHA1.Substring(0, 12)
            $archive = "dx-js-windows-x86_64-$shortSha.zip"
            Compress-Archive -Path "dist\*" -DestinationPath "dist\$archive" -Force
            $hash = Get-FileHash -Algorithm SHA256 -LiteralPath "dist\$archive"
            "$($hash.Hash.ToLowerInvariant())  $archive" | Set-Content -LiteralPath "dist\SHA256SUMS.txt" -Encoding ASCII
      - store_artifacts:
          path: dist
      - run:
          name: Upload to GitHub release essence-dx/js
          shell: powershell.exe
          command: |
            
            refreshenv
            $env:GH_TOKEN = [System.Environment]::GetEnvironmentVariable("CIRCLECI_GH_TOKEN")
            $tag = "windows"
            gh release create $tag --repo essence-dx/js --title "Windows build" --notes "CI Windows artifact" --target $env:CIRCLE_SHA1 2>$null; $LASTEXITCODE = 0
            gh release upload $tag dist\dx-js-windows-x86_64-*.zip --repo essence-dx/js --clobber


